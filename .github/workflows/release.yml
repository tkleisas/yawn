name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
            build-type: Release
            archive-ext: zip
          - os: ubuntu-latest
            platform: linux
            build-type: Release
            archive-ext: tar.gz

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.platform }})

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for version tag

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1-mesa-dev \
            libgles2-mesa-dev \
            libegl1-mesa-dev \
            libasound2-dev \
            libpulse-dev \
            libpipewire-0.3-dev \
            libx11-dev \
            libxext-dev \
            libxrandr-dev \
            libxcursor-dev \
            libxfixes-dev \
            libxi-dev \
            libxinerama-dev \
            libxss-dev \
            libxtst-dev \
            libxkbcommon-dev \
            libwayland-dev \
            libdecor-0-dev \
            libdrm-dev \
            libgbm-dev \
            libdbus-1-dev \
            libibus-1.0-dev \
            libudev-dev

      - name: Install Python dependencies
        run: pip install jinja2

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=${{ matrix.build-type }} ${{ runner.os == 'Windows' && format('-DPython3_EXECUTABLE="{0}/python3.exe" -DPython_EXECUTABLE="{0}/python3.exe"', env.pythonLocation) || '' }}

      - name: Build
        run: cmake --build build --config ${{ matrix.build-type }} --parallel

      - name: Test
        working-directory: build
        run: ctest --build-config ${{ matrix.build-type }} --output-on-failure --parallel

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          $dir = "YAWN-${version}-windows"
          New-Item -ItemType Directory -Path $dir -Force
          Copy-Item build/bin/Release/YAWN.exe $dir/
          if (Test-Path build/bin/Release/assets) {
            Copy-Item -Recurse build/bin/Release/assets $dir/
          }
          Get-ChildItem build/bin/Release/*.dll -ErrorAction SilentlyContinue |
            Copy-Item -Destination $dir/
          Compress-Archive -Path $dir -DestinationPath "YAWN-${version}-windows.zip"

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          version="${GITHUB_REF_NAME#v}"
          dir="YAWN-${version}-linux"
          mkdir -p "$dir"
          cp build/bin/YAWN "$dir/"
          if [ -d build/bin/assets ]; then
            cp -r build/bin/assets "$dir/"
          fi
          tar czf "YAWN-${version}-linux.tar.gz" "$dir"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: YAWN-${{ matrix.platform }}
          path: YAWN-*-${{ matrix.platform }}.${{ matrix.archive-ext }}

  release:
    needs: build
    runs-on: ubuntu-latest
    name: Create Release

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            YAWN-windows/*.zip
            YAWN-linux/*.tar.gz
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
